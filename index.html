<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Buat Sayang 🤍</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MUSIC -->
<audio autoplay loop id="bgMusic">
  <source src="svg.mp3" type="audio/mpeg">
</audio>

<!-- OPEN LETTER -->
<section class="page intro" id="intro">

  <div class="letter-wrapper">

    <div class="envelope" onclick="openLetter()">

      <div class="letter-front">
        🤍
      </div>

      <div class="letter-text">
        Buka
      </div>

    </div>

  </div>

</section>

<!-- MAIN -->
<section class="page hidden hero" id="mainPage">

  <div class="overlay"></div>

  <div class="hero-content">

    <img src="Image2.jpg" class="profile">

    <h1 id="typing"></h1>

    <p class="fade-text">
      Maaf ya sayang...
      Aku sadar aku terlalu tantrum hari ini.
      Padahal kamu juga lagi capek.
      Terima kasih karena sudah baik dan sabar menghadapi aku.
      Aku belajar buat jadi lebih baik lagi.
      Aku sayang banget sama kamu 🤍
    </p>

    <button onclick="showGallery()">
      Hehehehe ... 🤍
    </button>

  </div>

</section>

<!-- GALLERY -->
<section class="page hidden gallery-page" id="galleryPage">

  <h2>Kesayangan Akuuuu 🤍</h2>

  <div class="floating-gallery">

    <img src="Image1.jpg" class="photo p1">
    <img src="Image2.jpg" class="photo p2">
    <img src="Image3.jpg" class="photo p3">
    <img src="Image4.jpg" class="photo p4">
    <img src="Image5.jpg" class="photo p5">
    <img src="Image6.jpg" class="photo p6">

  </div>

  <button class="endBtn" onclick="showEnding()">
    Terakhir 🤍
  </button>

</section>

<!-- ENDING -->
<section class="page hidden ending" id="endingPage">

  <div class="ending-content">

    <h1>I Love You 🤍</h1>

    <p>
      Terima kasih sudah bertahan sejauh ini.
    </p>

  </div>

</section>

<script src="script.js"></script>

</body>
</html>
